services:
  postgres:
    image: postgres:16-alpine
    container_name: exori-nextjs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: exori
      POSTGRES_PASSWORD: exori
      POSTGRES_DB: exori_nextjs
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exori -d exori_nextjs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
